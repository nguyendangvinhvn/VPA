<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Grand Stage</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', serif;
            background: #000;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .stage-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(180deg, #1e4a6e 0%, #2a6ba8 20%, #4a8fd8 50%, #2a6ba8 80%, #1e4a6e 100%);
            overflow: hidden;
        }

        /* Golden valance at top */
        .valance {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 50px;
            background: linear-gradient(180deg, #8B0000 0%, #DC143C 100%);
            z-index: 15;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }

        .valance::before {
            content: '';
            position: absolute;
            bottom: -25px;
            left: 0;
            width: 100%;
            height: 30px;
            background: repeating-linear-gradient(
                90deg,
                #b8941e 0px,
                #d4af37 15px,
                #f4d03f 30px,
                #ffe066 45px,
                #f4d03f 60px,
                #d4af37 75px,
                #b8941e 90px
            );
            clip-path: polygon(
                0% 0%, 2.5% 100%, 5% 0%, 7.5% 100%, 10% 0%, 12.5% 100%, 15% 0%, 17.5% 100%,
                20% 0%, 22.5% 100%, 25% 0%, 27.5% 100%, 30% 0%, 32.5% 100%, 35% 0%, 37.5% 100%,
                40% 0%, 42.5% 100%, 45% 0%, 47.5% 100%, 50% 0%, 52.5% 100%, 55% 0%, 57.5% 100%,
                60% 0%, 62.5% 100%, 65% 0%, 67.5% 100%, 70% 0%, 72.5% 100%, 75% 0%, 77.5% 100%,
                80% 0%, 82.5% 100%, 85% 0%, 87.5% 100%, 90% 0%, 92.5% 100%, 95% 0%, 97.5% 100%, 100% 0%
            );
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.4);
        }

        .valance::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 8px;
            background: linear-gradient(90deg, #d4af37 0%, #ffe066 50%, #d4af37 100%);
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
        }

        /* Curtain wrappers */
        .curtain-wrapper {
            position: absolute;
            top: 60px;
            height: calc(100% - 60px);
            z-index: 10;
            transition: transform 2s ease-in-out;
        }

        .curtain-left-wrapper {
            left: 0;
            width: 50%;
        }

        .curtain-right-wrapper {
            right: 0;
            width: 50%;
        }

        /* Red curtains with folds */
        .curtain {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            background: #DC143C;
        }

        .curtain-left {
            clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%);
        }

        .curtain-right {
            clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%);
        }

        .curtain-fold {
            flex: 1;
            position: relative;
            background: linear-gradient(90deg, 
                #8B0000 0%,
                #DC143C 15%,
                #FF4444 30%,
                #DC143C 50%,
                #8B0000 65%,
                #DC143C 85%,
                #8B0000 100%
            );
            box-shadow: inset -2px 0 8px rgba(0, 0, 0, 0.4), inset 2px 0 8px rgba(255, 255, 255, 0.1);
        }

        /* Blue stage */
        .stage {
            position: relative;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center top, #4a9fd8 0%, #2563a8 50%, #1a3a5c 100%);
        }

        /* Video player */
        .stage-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 5;
            opacity: 0;
            visibility: hidden;
            transition: opacity 1s ease-in-out, visibility 1s ease-in-out;
        }

        /* Spotlights */
        .spotlight {
            position: absolute;
            top: 100px;
            width: 200px;
            height: 500px;
            background: radial-gradient(ellipse at top, rgba(255, 255, 220, 0.25) 0%, rgba(200, 220, 255, 0.1) 40%, transparent 70%);
            pointer-events: none;
            z-index: 2;
        }

        .spotlight-left {
            left: 25%;
            transform: rotate(-8deg);
        }

        .spotlight-right {
            right: 25%;
            transform: rotate(8deg);
        }

        /* Play button */
        .play-button-container {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 20;
            transition: opacity 1s ease-in-out, visibility 1s ease-in-out;
        }

        .play-button {
            width: 80px;
            height: 80px;
            background: rgba(220, 20, 60, 0.9);
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
        }

        .play-button svg {
            width: 32px;
            height: 32px;
            color: #fff;
            margin-left: 4px;
        }

        .play-button:hover {
            background: rgba(220, 20, 60, 1);
            transform: scale(1.1);
            box-shadow: 0 10px 40px rgba(220, 20, 60, 0.5);
        }

        /* Hide play button when curtain opens */
        .curtain-open .play-button-container {
            opacity: 0;
            visibility: hidden;
        }

        /* Stage floor */
        .stage-floor {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 30%;
            background: linear-gradient(180deg, transparent 0%, rgba(30, 90, 142, 0.3) 20%, #1e5a8e 50%, #2563a8 100%);
            border-top: 2px solid rgba(100, 180, 255, 0.3);
            border-radius: 50% 50% 0 0 / 30% 30% 0 0;
        }

        /* Curtain open animation */
        .curtain-open .curtain-left-wrapper {
            transform: translateX(-100%);
        }

        .curtain-open .curtain-right-wrapper {
            transform: translateX(100%);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .valance {
                height: 35px;
            }
            
            .valance::before {
                bottom: -20px;
                height: 25px;
            }
            
            .curtain-wrapper {
                top: 35px;
                height: calc(100% - 35px);
            }
            
            .play-button {
                width: 60px;
                height: 60px;
            }
            
            .play-button svg {
                width: 24px;
                height: 24px;
            }
            
            .curtain-left-wrapper {
                width: 50%;
            }
            
            .curtain-right-wrapper {
                width: 50%;
            }
        }
    </style>
</head>
<body>
    <div class="stage-container">
        <!-- Golden valance top -->
        <div class="valance"></div>
        
        <!-- Red curtains with folds -->
        <div class="curtain-wrapper curtain-left-wrapper">
            <div class="curtain curtain-left">
                <div class="curtain-fold"></div>
                <div class="curtain-fold"></div>
                <div class="curtain-fold"></div>
                <div class="curtain-fold"></div>
                <div class="curtain-fold"></div>
                <div class="curtain-fold"></div>
                <div class="curtain-fold"></div>
                <div class="curtain-fold"></div>
                <div class="curtain-fold"></div>
                <div class="curtain-fold"></div>
            </div>
        </div>
        
        <div class="curtain-wrapper curtain-right-wrapper">
            <div class="curtain curtain-right">
                <div class="curtain-fold"></div>
                <div class="curtain-fold"></div>
                <div class="curtain-fold"></div>
                <div class="curtain-fold"></div>
                <div class="curtain-fold"></div>
                <div class="curtain-fold"></div>
                <div class="curtain-fold"></div>
                <div class="curtain-fold"></div>
                <div class="curtain-fold"></div>
                <div class="curtain-fold"></div>
            </div>
        </div>
        
        <!-- Blue stage area -->
        <div class="stage">
            <!-- Video player (hidden initially) -->
            <video id="stageVideo" class="stage-video" controls>
                <source src="7832824198781.mp4" type="video/mp4">
                Trình duyệt của bạn không hỗ trợ video.
            </video>
            
            <!-- Spotlights -->
            <div class="spotlight spotlight-left"></div>
            <div class="spotlight spotlight-right"></div>
            
            <!-- Play button -->
            <div class="play-button-container">
                <button class="play-button" id="playBtn">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M8 5v14l11-7z"/>
                    </svg>
                </button>
            </div>
            
            <!-- Stage floor -->
            <div class="stage-floor"></div>
        </div>
    </div>
    
    <script>
        // Play button functionality
        const playBtn = document.getElementById('playBtn');
        const stageContainer = document.querySelector('.stage-container');
        const stageVideo = document.getElementById('stageVideo');

        playBtn.addEventListener('click', function() {
            // Open curtains
            stageContainer.classList.add('curtain-open');
            
            // Wait a bit for curtain to start opening, then show and play video
            setTimeout(() => {
                stageVideo.style.opacity = '1';
                stageVideo.style.visibility = 'visible';
                stageVideo.play();
            }, 500); // Start video shortly after curtain begins opening
        });
    </script>
</body>
</html>
